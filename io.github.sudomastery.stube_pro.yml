app-id: io.github.sudomastery.stube_pro
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: stube

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=network
  # where downloads land
  - --filesystem=xdg-videos:create
  # read-only access to browser profiles for cookie import (yt-dlp)
  - --filesystem=~/.config/BraveSoftware:ro
  - --filesystem=~/.config/google-chrome:ro
  - --filesystem=~/.config/chromium:ro
  - --filesystem=~/.config/microsoft-edge:ro
  - --filesystem=~/.mozilla:ro
  # decrypting Chromium-based browser cookies needs the keyring
  - --talk-name=org.freedesktop.secrets
  # on KDE the cookie key lives in KWallet instead
  - --talk-name=org.kde.kwalletd6
  - --talk-name=org.kde.kwalletd5

modules:
  - name: python3-yt-dlp
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
        --prefix=${FLATPAK_DEST} --no-build-isolation --no-deps yt-dlp yt-dlp-ejs mutagen
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/f3/ee/188a3dadf9dfdac713243521f919feca1cd091d4358c9ea7e8ebb710a7cc/yt_dlp-2026.6.9-py3-none-any.whl
        sha256: 442ba4c75724b9496144c8434b617962ee08d0ee7c26ec663848fe9b78d5a3e4
      - type: file
        url: https://files.pythonhosted.org/packages/e3/bd/520769863744b669440a924271a6159ddd82ad5ae26b4ac4d4b69e9f8d44/yt_dlp_ejs-0.8.0-py3-none-any.whl
        sha256: 79300e5fca7f937a1eeede11f0456862c1b41107ce1d726871e0207424f4bdb4
      - type: file
        url: https://files.pythonhosted.org/packages/47/d8/a29e4e3991765e7ce4ed1f7e4074fe1ba9da03e0048639734de60f9cadb9/mutagen-1.48.1-py3-none-any.whl
        sha256: 4f077fe87d3fc7fba259aa63d8c026b18382ca6a42ef37c61e16f1b1b5b82fe7

  # decrypts Chromium-based browser cookies stored with the GNOME keyring
  - name: python3-secretstorage
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
        --prefix=${FLATPAK_DEST} --no-build-isolation --no-deps secretstorage jeepney
        cryptography cffi pycparser
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/b7/46/f5af3402b579fd5e11573ce652019a67074317e18c1935cc0b4ba9b35552/secretstorage-3.5.0-py3-none-any.whl
        sha256: 0ce65888c0725fcb2c5bc0fdb8e5438eece02c523557ea40ce0703c266248137
      - type: file
        url: https://files.pythonhosted.org/packages/b2/a3/e137168c9c44d18eff0376253da9f1e9234d0239e0ee230d2fee6cea8e55/jeepney-0.9.0-py3-none-any.whl
        sha256: 97e5714520c16fc0a45695e5365a2e11b81ea79bba796e26f9f1d178cb182683
      - type: file
        only-arches: [x86_64]
        url: https://files.pythonhosted.org/packages/b8/7b/62cbbab75d0659865bf0273790031544a0b16c8072d258f9428dcd8190dc/cryptography-49.0.0-cp39-abi3-manylinux_2_28_x86_64.whl
        sha256: 6f2debedf9ca60cf1d5bd466475638af5130f89965605cd818484d19987d3a21
      - type: file
        only-arches: [aarch64]
        url: https://files.pythonhosted.org/packages/a5/4d/9c0cd02f95e2602dd5e563da149ee0830abef3537be8b34dc56281ebe27a/cryptography-49.0.0-cp39-abi3-manylinux_2_28_aarch64.whl
        sha256: 0f21641cf4b30fca7aee061ced0ec7ad7b073518088b7c9969a297c0ae796c69
      - type: file
        only-arches: [x86_64]
        url: https://files.pythonhosted.org/packages/6f/08/f2e7d62c460faae0926f2d6e423694aa409ced3bc1fe2927a0a6e5f05416/cffi-2.1.0-cp313-cp313-manylinux2014_x86_64.manylinux_2_17_x86_64.whl
        sha256: 799416bae98336e400981ff6e532d67d5c709cfb30afb79865a1315f94b0e224
      - type: file
        only-arches: [aarch64]
        url: https://files.pythonhosted.org/packages/3a/a6/e879bb68cc23a2bc9ba8f4b7d8019f0c2694bad2ab6c4a3701d429439f58/cffi-2.1.0-cp313-cp313-manylinux2014_aarch64.manylinux_2_17_aarch64.whl
        sha256: ff067a8d8d880e7809e4ac88eb009bb848870115317b306666502ccad30b147f
      - type: file
        url: https://files.pythonhosted.org/packages/0c/c3/44f3fbbfa403ea2a7c779186dc20772604442dde72947e7d01069cbe98e3/pycparser-3.0-py3-none-any.whl
        sha256: b727414169a36b7d524c1c3e31839a521725078d7b2ff038656844266160a992

  # JavaScript runtime required by yt-dlp to solve YouTube's player challenges
  - name: deno
    buildsystem: simple
    build-commands:
      - install -Dm755 deno ${FLATPAK_DEST}/bin/deno
    sources:
      - type: archive
        only-arches: [x86_64]
        url: https://github.com/denoland/deno/releases/download/v2.9.1/deno-x86_64-unknown-linux-gnu.zip
        sha256: 710c54d63477d1100844ef4818f19507ce0dbf40510903b1d883f19e394446a2
        strip-components: 0
      - type: archive
        only-arches: [aarch64]
        url: https://github.com/denoland/deno/releases/download/v2.9.1/deno-aarch64-unknown-linux-gnu.zip
        sha256: 0a60d079fa79635a59803074dbbfe86ccc35746dc2c4f8d73f2e50338b3283a9
        strip-components: 0

  - name: stube
    buildsystem: simple
    build-commands:
      - install -Dm755 stube.py ${FLATPAK_DEST}/bin/stube
      - install -Dm644 io.github.sudomastery.stube_pro.desktop -t ${FLATPAK_DEST}/share/applications
      - install -Dm644 io.github.sudomastery.stube_pro.metainfo.xml -t ${FLATPAK_DEST}/share/metainfo
      - for s in 32 64 128 256 512; do install -Dm644 icons/stube-${s}.png
        ${FLATPAK_DEST}/share/icons/hicolor/${s}x${s}/apps/io.github.sudomastery.stube_pro.png; done
    sources:
      - type: git
        url: https://github.com/sudomastery/stube_pro.git
        tag: v1.0.9
